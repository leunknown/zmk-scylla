CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Uses internal clk if uncommented. Higher idle power drain
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# turns NFC pins to GPIO
