CONFIG_ZMK_SLEEP=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Uses internal clk if uncommented. Higher idle power drain
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# turns NFC pins to GPIO
# CONFIG_NFCT_PINS_AS_GPIOS=y 

# Explicitly enables Bluetooth and Split features 
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y

# Experimental for improving split link
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# For Link Stability and Connectivity to laptops
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y


# Uncomment for RGB support. See the relevant options in the documentation
# https://zmk.dev/docs/features/underglow#configuring-rgb-underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
